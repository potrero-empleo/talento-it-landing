<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobertura Nacional — TALENTO IT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --lima:        #C8D400;
    --lima-bright: #e9f25a;
    --lima-soft:   #d3d93b;
    --verde:       #9ddf49;
    --olive-dark:  #4a5200;
    --olive-mid:   #6e7800;
    --negro:       #1a1a1a;
    --bg:          #0a0a0a;
    --grey:        #9a9a9a;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    background:var(--bg);
    font-family:'Space Mono', monospace;
    color:#fff;
  }

  .coverage-section{
    position:relative;
    isolation:isolate;
    background:var(--bg);
    border-top:1px solid #222;
    border-bottom:1px solid #222;
    padding: 72px 24px 60px;
    overflow:hidden;
    min-height: 760px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
  }

  /* base grid texture — consistent with the rest of the TALENTO IT site */
  .bg-grid{
    position:absolute; inset:0;
    background-image:
      linear-gradient(#1e1e1e 1px, transparent 1px),
      linear-gradient(90deg, #1e1e1e 1px, transparent 1px);
    background-size: 34px 34px;
    -webkit-mask-image: radial-gradient(ellipse 65% 75% at 50% 38%, #000 35%, transparent 80%);
            mask-image: radial-gradient(ellipse 65% 75% at 50% 38%, #000 35%, transparent 80%);
    opacity:0.9;
    z-index:0;
  }

  .bg-glow{
    position:absolute; inset:0;
    background: radial-gradient(ellipse 50% 40% at 50% 32%, rgba(200,212,0,0.10), transparent 70%);
    z-index:0;
    pointer-events:none;
  }

  /* corner reticle — quiet HUD framing, echoes a coverage / radar instrument */
  .corner{
    position:absolute;
    width:22px; height:22px;
    border:1.5px solid rgba(200,212,0,0.35);
    z-index:2;
    pointer-events:none;
  }
  .corner.tl{ top:28px; left:28px; border-right:none; border-bottom:none; }
  .corner.tr{ top:28px; right:28px; border-left:none; border-bottom:none; }
  .corner.bl{ bottom:28px; left:28px; border-right:none; border-top:none; }
  .corner.br{ bottom:28px; right:28px; border-left:none; border-top:none; }

  .tag{
    position:absolute;
    top:30px; left:60px;
    font-size:0.62rem;
    letter-spacing:0.18em;
    color:rgba(200,212,0,0.55);
    z-index:2;
    text-transform:uppercase;
  }

  /* ---------- the 3D stage ---------- */
  .stage{
    position:relative;
    width:min(78vw, 360px);
    z-index:1;
    perspective: 1400px;
  }

  .tilt{
    transform: rotateX(-30deg);
    transform-origin:50% 50%;
    filter:
      drop-shadow(0 0 36px rgba(200,212,0,0.28))
      drop-shadow(0 40px 36px rgba(0,0,0,0.6));
  }

  @media (prefers-reduced-motion: no-preference){
    .tilt{
      animation: float 7s ease-in-out infinite;
    }
  }
  @keyframes float{
    0%, 100%{ transform: rotateX(-30deg) translateY(0px); }
    50%{ transform: rotateX(-30deg) translateY(-10px); }
  }

  svg.map{
    width:100%;
    height:auto;
    display:block;
    overflow:visible;
  }

  .map-extrude{ fill:var(--olive-dark); }
  .map-base{ fill:url(#mapFill); }
  .map-outline{ fill:none; stroke:var(--olive-mid); stroke-width:1.4; }
  .map-grid{ fill:url(#gridPattern); }

  .link{
    fill:none;
    stroke:var(--lima);
    stroke-width:1;
    stroke-dasharray:1 5;
    opacity:0.35;
  }

  .node-core{ fill:#fff; }
  .node-mid{ fill:var(--lima-bright); }
  .node-ring{
    fill:none;
    stroke:var(--lima);
    stroke-width:2;
    transform-box: fill-box;
    transform-origin:center;
  }

  @media (prefers-reduced-motion: no-preference){
    .node-ring{ animation: pulse 2.6s ease-out infinite; }
  }
  @keyframes pulse{
    0%   { transform:scale(0.25); opacity:0.85; }
    75%  { opacity:0; }
    100% { transform:scale(2.4); opacity:0; }
  }

  /* ---------- caption ---------- */
  .caption{
    position:relative;
    z-index:2;
    margin-top:34px;
    text-align:center;
  }
  .caption .label{
    font-family:'Chakra Petch', sans-serif;
    font-weight:700;
    letter-spacing:0.16em;
    text-transform:uppercase;
    font-size:clamp(1.1rem, 4vw, 1.4rem);
    color:#fff;
  }
  .caption .sub{
    margin-top:8px;
    font-size:0.72rem;
    letter-spacing:0.08em;
    color:var(--grey);
    text-transform:uppercase;
  }
  .caption .sub b{ color:var(--lima-soft); font-weight:700; }
</style>
</head>

<script>
  const cities = [{"name": "Buenos Aires", "x": 324.3, "y": 346.7, "hub": true}, {"name": "Córdoba", "x": 200.5, "y": 260.6, "hub": false}, {"name": "Rosario", "x": 275.9, "y": 301.8, "hub": false}, {"name": "Mendoza", "x": 101.2, "y": 300.3, "hub": false}, {"name": "Salta", "x": 174.4, "y": 81.1, "hub": false}, {"name": "Resistencia", "x": 311.1, "y": 153.2, "hub": false}, {"name": "Neuquén", "x": 117.9, "y": 464.4, "hub": false}, {"name": "Mar del Plata", "x": 342.2, "y": 438.8, "hub": false}, {"name": "Comodoro Rivadavia", "x": 129.9, "y": 651.4, "hub": false}, {"name": "Ushuaia", "x": 112.7, "y": 893.3, "hub": false}];

  const NS = "http://www.w3.org/2000/svg";
  const linksG = document.getElementById("links");
  const nodesG = document.getElementById("nodes");
  const hub = cities.find(c => c.hub);

  // subtle data-links from the hub toward the four corners of the country
  const linkTargets = ["Salta", "Ushuaia", "Mendoza", "Resistencia"];
  linkTargets.forEach(name => {
    const c = cities.find(c => c.name === name);
    if (!c) return;
    const line = document.createElementNS(NS, "line");
    line.setAttribute("class", "link");
    line.setAttribute("x1", hub.x); line.setAttribute("y1", hub.y);
    line.setAttribute("x2", c.x);   line.setAttribute("y2", c.y);
    linksG.appendChild(line);
  });

  cities.forEach((c, i) => {
    const r = c.hub ? 7 : 4.2;
    const ringR = c.hub ? 9 : 5.5;
    const delay = (i * 0.32).toFixed(2) + "s";

    const ring = document.createElementNS(NS, "circle");
    ring.setAttribute("class", "node-ring");
    ring.setAttribute("cx", c.x); ring.setAttribute("cy", c.y);
    ring.setAttribute("r", ringR);
    ring.style.animationDelay = delay;
    nodesG.appendChild(ring);

    const mid = document.createElementNS(NS, "circle");
    mid.setAttribute("class", "node-mid");
    mid.setAttribute("cx", c.x); mid.setAttribute("cy", c.y);
    mid.setAttribute("r", r);
    nodesG.appendChild(mid);

    const core = document.createElementNS(NS, "circle");
    core.setAttribute("class", "node-core");
    core.setAttribute("cx", c.x); core.setAttribute("cy", c.y);
    core.setAttribute("r", r * 0.45);
    nodesG.appendChild(core);
  });
</script>
